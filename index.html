<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RE:BORN — Собери ПК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=6">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-title">⚡ RE:BORN — Собери ПК</div>
            <div class="header-stats">
                <span class="stat">🪙 <span id="bonus-points">0</span></span>
                <span class="stat">🎫 <span id="tickets">2</span>/2</span>
            </div>
        </div>

        <!-- PC Case with background image -->
        <div class="case-container">
            <div class="pc-image-wrapper" id="pc-case">
                <img src="bg.png" class="pc-bg-image" alt="PC Case">

                <!-- Component slots overlaid on image -->
                <div class="pc-slot slot-cool" id="slot-cool" data-slot="cool">
                    <div class="slot-placeholder">Кулер</div>
                </div>
                <div class="pc-slot slot-cpu" id="slot-cpu" data-slot="cpu">
                    <div class="slot-placeholder">CPU</div>
                </div>
                <div class="pc-slot slot-ram" id="slot-ram" data-slot="ram">
                    <div class="slot-placeholder">RAM</div>
                </div>
                <div class="pc-slot slot-mb" id="slot-mb" data-slot="mb">
                    <div class="slot-placeholder">Мат. плата</div>
                </div>
                <div class="pc-slot slot-gpu" id="slot-gpu" data-slot="gpu">
                    <div class="slot-placeholder">Видеокарта</div>
                </div>
                <div class="pc-slot slot-psu" id="slot-psu" data-slot="psu">
                    <div class="slot-placeholder">БП</div>
                </div>
                <div class="pc-slot slot-case" id="slot-case" data-slot="case">
                    <div class="slot-placeholder">Корпус</div>
                </div>
            </div>

            <!-- Build bar -->
            <div class="build-bar">
                <div class="build-bar-label">
                    <span id="build-tier-name">Пустая сборка</span>
                    <span id="build-stars"></span>
                </div>
                <div class="build-progress-track">
                    <div class="build-progress-fill" id="build-progress"></div>
                </div>
                <div class="build-bar-sub">
                    <span>⚡ <span id="build-power">0</span> мощности</span>
                    <span id="build-count">0/7</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="action-area">
            <button class="btn-drop" id="btn-drop">
                <span class="btn-drop-icon">📦</span>
                <span class="btn-drop-text">Выбить деталь</span>
                <span class="btn-drop-sub" id="drop-sub">🎫 2 попытки</span>
            </button>
            <button class="btn-assemble" id="btn-assemble" disabled>
                <span>⚡ Собрать ПК и получить бонус</span>
            </button>
        </div>
        <div class="ticket-timer" id="ticket-timer"></div>

        <!-- Bottom tabs -->
        <div class="bottom-tabs">
            <button class="btab active" data-tab="main">🖥 Сборка</button>
            <button class="btab" data-tab="inventory">🎒 Детали</button>
            <button class="btab" data-tab="rating">🏆 Рейтинг</button>
        </div>

        <!-- Inventory -->
        <div id="page-inventory" class="page">
            <div class="inventory-filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="cpu">CPU</button>
                <button class="filter-btn" data-filter="gpu">GPU</button>
                <button class="filter-btn" data-filter="ram">RAM</button>
                <button class="filter-btn" data-filter="mb">Плата</button>
                <button class="filter-btn" data-filter="psu">БП</button>
                <button class="filter-btn" data-filter="case">Корпус</button>
                <button class="filter-btn" data-filter="cool">Кулер</button>
            </div>
            <div class="inventory-list" id="inventory-list"></div>
        </div>

        <!-- Rating -->
        <div id="page-rating" class="page">
            <div class="rating-tiers" id="rating-tiers"></div>
            <div class="builds-history" id="builds-history"></div>
        </div>

        <!-- Drop overlay -->
        <div class="drop-overlay hidden" id="drop-overlay">
            <div class="drop-reveal" id="drop-reveal">
                <div class="drop-glow" id="drop-glow"></div>
                <div class="drop-component" id="drop-component">
                    <div class="drop-comp-icon" id="drop-comp-icon"></div>
                </div>
                <div class="drop-info" id="drop-info">
                    <div class="drop-rarity" id="drop-rarity"></div>
                    <div class="drop-model" id="drop-model"></div>
                    <div class="drop-power" id="drop-power"></div>
                    <div class="drop-action" id="drop-action"></div>
                </div>
            </div>
        </div>

        <!-- Flying comp -->
        <div class="flying-comp hidden" id="flying-comp"></div>
    </div>

    <script src="game.js?v=6"></script>
</body>
</html>
