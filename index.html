<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RE:BORN — Собери ПК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=126">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-brand" aria-label="RE:BORN">
                <span class="brand-text"><span>RE</span><span class="brand-colon">:</span><span>BORN</span></span>
            </div>
            <div class="header-stats" aria-label="Resources">
                <span class="stat stat-coin"><span class="stat-value" id="bonus-points">0</span><span class="coin-glyph" aria-hidden="true"></span></span>
                <span class="stat stat-ticket"><span class="stat-value" id="tickets">2</span><span class="ticket-glyph" aria-hidden="true"></span></span>
            </div>
        </div>

        <!-- PC Case - dynamic SVG -->
        <div class="case-container">
            <div class="pc-scene">
                <div class="pc-case-area" id="pc-case">
                    <img src="bg.png" class="pc-bg-image" id="pc-bg-image" alt="PC">
                    <div class="case-glow" id="case-glow"></div>
                    <!-- Component overlays: same size as bg, same object-fit -->
                    <img src="" id="pc-mb-image" class="pc-bg-image hw-layer" alt="">
                    <img src="" id="pc-ram-image" class="pc-bg-image hw-layer" alt="">
                    <img src="" id="pc-cpu-image" class="pc-bg-image hw-layer" alt="">
                    <img src="" id="pc-gpu-image" class="pc-bg-image hw-layer" alt="">
                    <img src="" id="pc-cool-image" class="pc-bg-image hw-layer" alt="">
                    <img src="" id="pc-psu-image" class="pc-bg-image hw-layer" alt="">

                </div>
                <div class="pc-desk"></div>
            </div>

            <div class="main-control-deck">
                <div class="deck-actions">
                    <button class="btn-drop" id="btn-drop">
                        <span class="btn-drop-text">Выбить</span>
                        <span class="btn-drop-sub" id="drop-sub"><b>2</b><span class="ticket-total">/100</span> 🎫</span>
                    </button>
                    <button class="btn-assemble" id="btn-assemble" disabled>
                        <span class="assemble-mark">⚡</span>
                        <span class="assemble-label">Собрать ПК</span>
                    </button>
                </div>

                <div class="deck-status">
                    <div class="ticket-timer" id="ticket-timer"></div>
                </div>

                <button class="build-summary" id="build-summary" type="button">
                    <span id="build-summary-title">Сборка 0/6</span>
                    <span id="build-summary-power">⚡0</span>
                </button>
            </div>

            <div class="build-sheet hidden" id="build-sheet">
                <div class="build-sheet-card">
                    <div class="build-sheet-header">
                        <span>Слоты сборки</span>
                        <button class="build-sheet-close" id="build-sheet-close" type="button">×</button>
                    </div>
                    <div class="comp-grid" id="comp-grid"></div>
                </div>
            </div>
        </div>

        <!-- Bottom tabs -->
        <div class="bottom-tabs" aria-label="Навигация">
            <button class="btab active" data-tab="main" type="button">
                <span class="btab-icon btab-icon-main" aria-hidden="true"></span>
                <span class="btab-label">Сборка</span>
            </button>
            <button class="btab" data-tab="inventory" type="button">
                <span class="btab-icon btab-icon-inventory" aria-hidden="true"></span>
                <span class="btab-label">Детали</span>
            </button>
            <button class="btab" data-tab="rating" type="button">
                <span class="btab-icon btab-icon-rating" aria-hidden="true"></span>
                <span class="btab-label">Рейтинг</span>
            </button>
        </div>

        <!-- Inventory -->
        <div id="page-inventory" class="page">
            <!-- Build bar moved here so the player sees their current build's
                 tier/power readout while browsing parts. -->
            <div class="build-bar">
                <div class="build-bar-label">
                    <span id="build-tier-name">Пустая сборка</span>
                    <span id="build-power">⚡0 · 0/6</span>
                </div>
                <div class="build-progress-track">
                    <div class="build-progress-fill" id="build-progress"></div>
                </div>
            </div>
            <div class="inv-tabs" id="inv-tabs"></div>
            <div class="inventory-list" id="inventory-list"></div>
        </div>

        <!-- Slot inventory popup -->
        <div class="slot-popup hidden" id="slot-popup">
            <div class="slot-popup-content">
                <div class="slot-popup-header">
                    <span class="slot-popup-title" id="slot-popup-title"></span>
                    <button class="slot-popup-close" id="slot-popup-close">✕</button>
                </div>
                <div class="slot-popup-list" id="slot-popup-list"></div>
            </div>
        </div>

        <!-- Rating -->
        <div id="page-rating" class="page">
            <div class="rating-tiers" id="rating-tiers"></div>
            <div class="builds-history" id="builds-history"></div>
        </div>

        <!-- Drop overlay -->
        <div class="drop-overlay hidden" id="drop-overlay">
            <div class="drop-reveal" id="drop-reveal">
                <div class="drop-glow" id="drop-glow"></div>
                <div class="drop-category" id="drop-category"></div>
                <div class="drop-component" id="drop-component">
                    <div class="drop-comp-icon" id="drop-comp-icon"></div>
                </div>
                <div class="drop-info" id="drop-info">
                    <div class="drop-model" id="drop-model"></div>
                    <div class="drop-rarity" id="drop-rarity"></div>
                    <div class="drop-power" id="drop-power"></div>
                    <div class="drop-action" id="drop-action"></div>
                </div>
            </div>
        </div>

        <!-- Flying comp -->
        <div class="flying-comp hidden" id="flying-comp"></div>

        <!-- Version + admin badge. Lives INSIDE #app so it's parsed before
             the scripts run; otherwise game.js's getElementById returns null. -->
        <div id="app-version" style="position:fixed;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,0.25);z-index:9999;pointer-events:none">v=160</div>
    </div>

    <!-- Force-refetch on every load — Telegram WebView caches scripts very
         aggressively, even past Cache-Control headers. The timestamp param
         makes every URL unique so browser cache can never match. -->
    <script>
    (function () {
        var ts = Date.now();
        document.write('<script src="cases.js?ts=' + ts + '"><\/script>');
        document.write('<script src="game.js?ts=' + ts + '"><\/script>');
    })();
    </script>
</body>
</html>
